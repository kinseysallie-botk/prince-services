<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)"/>

  <!-- P letter shape - modern geometric style -->
  <g transform="translate(130, 100)">
    <!-- Vertical stem -->
    <rect x="0" y="0" width="70" height="312" rx="12" fill="url(#iconGrad)"/>

    <!-- Bowl curve (top part) -->
    <path d="M 70 0 L 200 0 Q 280 0 280 80 L 280 120 Q 280 200 200 200 L 70 200 Z" fill="url(#iconGrad2)"/>

    <!-- Inner cutout for P -->
    <rect x="70" y="50" width="160" height="100" rx="20" fill="url(#bgGrad)"/>

    <!-- Horizontal connector -->
    <rect x="0" y="250" width="150" height="62" rx="12" fill="url(#iconGrad2)"/>
  </g>

  <!-- Decorative dots -->
  <circle cx="400" cy="400" r="25" fill="#06b6d4" opacity="0.6"/>
  <circle cx="420" cy="360" r="15" fill="#3b82f6" opacity="0.4"/>
  <circle cx="100" cy="120" r="20" fill="#22d3ee" opacity="0.5"/>

  <!-- Shield-like accent -->
  <path d="M 380 80 L 420 100 L 420 160 L 380 180 L 340 160 L 340 100 Z" fill="none" stroke="url(#iconGrad2)" stroke-width="8" opacity="0.4"/>

  <!-- Inner P letter on shield -->
  <text x="365" y="145" font-family="Arial, sans-serif" font-size="50" font-weight="bold" fill="url(#iconGrad)">P</text>
</svg>
